# Redis and Postgres containers for testing
name: limitkit-test
services:
  redis:
    image: redis:alpine
    container_name: limitkit-redis
    ports:
      - 6379:6379
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 2s
      retries: 15
  postgres:
    image: postgres:16-alpine
    container_name: limitkit-postgres
    environment:
      POSTGRES_DB: limitkit
      POSTGRES_USER: limitkit
      POSTGRES_PASSWORD: limitkit
    ports:
      - 5432:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U limitkit -d limitkit']
      interval: 2s
      timeout: 2s
      retries: 15
